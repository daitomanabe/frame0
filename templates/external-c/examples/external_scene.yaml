name: c_external_template_scene
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: false
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
nodes:
  external_node:
    type: external.c.template
    external: org.example.frame0.c_external
    params:
      gain: 1.2
      bias: 0.05
  shader:
    type: render.shader
    input: external_node.output
    shader: shaders/c_external_template.msl
outputs:
  preview:
    type: screen
    input: shader.output
