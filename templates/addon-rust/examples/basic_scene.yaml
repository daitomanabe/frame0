name: rust_addon_template_scene
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: false
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
nodes:
  addon_node:
    type: addon.rust.template
    addon: org.example.frame0.rust_addon
    params:
      gain: 1.5
      bias: 0.1
  shader:
    type: render.shader
    input: addon_node.output
    shader: shaders/rust_addon_template.msl
outputs:
  preview:
    type: screen
    input: shader.output
