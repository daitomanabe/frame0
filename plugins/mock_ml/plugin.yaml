plugin:
  id: io.frame0.mock.ml
  version: 0.1.0
  type: native
  entry:
    macos_arm64: ../../target/debug/libframe0_mock_ml.dylib
    macos_x86_64: ../../target/debug/libframe0_mock_ml.dylib
    linux_x86_64: ../../target/debug/libframe0_mock_ml.so
    linux_aarch64: ../../target/debug/libframe0_mock_ml.so
    dev: ../../target/debug/libframe0_mock_ml.dylib
  api_version: 1
  capabilities:
    - ml.inference
    - ml.model.load
    - ml.tensor
    - ml.classification
    - ml.embedding
    - coreml.model
    - metal.mps
    - ane.inference
  isolation:
    process: separate
    restart_policy: on_crash
  permissions:
    file_read: true
  vendor:
    sdk_name: FRAME0 Mock Native ML
    sdk_version: 0.1.0
    native_targets: CoreML/MPS/ANE

