name: native_ml
version: "0.1"
runtime: frame0
permissions:
  camera: true
  microphone: false
  network: false
  file_read: true
clock:
  primary: video.camera.main
  fallback: monotonic
  fixed_step_ns: 16666667
inputs:
  camera_a:
    type: device.video_input
    selector:
      capability: video.input
      vendor: frame0.mock
    mode: 1080p60
nodes:
  camera_tensor:
    type: ml.tensor_from_video
    input: camera_a.video
    shape: [1, 3, 224, 224]
    dtype: f32
  classifier:
    type: ml.native_inference
    input: camera_tensor.tensor
    model: mock_classifier
    backend: native_mock
    selector:
      capability: ml.inference
  label_shader:
    type: render.shader
    shader: shaders/ml_overlay.msl
    inputs:
      image: camera_a.video
      inference: classifier.output
outputs:
  preview:
    type: screen
    input: label_shader.output

