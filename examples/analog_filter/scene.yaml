name: analog_filter
version: "0.1"
runtime: frame0
permissions:
  camera: true
  microphone: true
  network: false
  file_read: true
  file_write: true
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
inputs:
  camera:
    type: video.input
    selector:
      capability: video.input
      vendor: frame0.mock
    mode: 720p60
    params:
      native_source: apple.avfoundation.camera
      session_preset: hd1280x720
      pixel_format: bgra8
      texture_bridge: CVMetalTextureCache
      mirroring: true
      orientation: landscape_right
      source_rotation: 90_cw
  microphone:
    type: audio.input
    selector:
      capability: audio.input
      vendor: frame0.mock
    mode: stereo_48k
    params:
      native_source: apple.coreaudio.input
      sample_rate: 48000
      channels: 2
      buffer_size: 1024
      local_meter_only: true
  feedback_history:
    type: render.feedback_history
    history: 2
    pixel_format: rgba16f
    params:
      role: previous_processed_frame
      reset_on_resize: true
nodes:
  audio_meter:
    type: audio.analysis.meter
    input: microphone.samples
    params:
      features: [rms_level, peak, transient, bass_envelope]
      rms_gain: 9.0
      peak_gain: 5.5
      bass_gain: 22.0
      transient_gain: 3.2
      fast_release: 0.72
      slow_release: 0.985
      bass_smoothing: 0.985
      outputs:
        level: audioLevel
        peak: audioPeak
        transient: audioTransient
        bass: audioBass
  analog_settings:
    type: parameter.preset_bank
    params:
      source_project: analog-filter
      source_modules:
        camera: Sources/AnalogFilterApp/CameraCapture.swift
        audio: Sources/AnalogFilterApp/AudioMeter.swift
        controls: Sources/AnalogFilterApp/ControlsPanel.swift
        renderer: Sources/AnalogFilterApp/MetalRenderer.swift
        shader: Sources/AnalogFilterApp/Resources/Shaders.metal
      default_preset: broadcast_ntsc
      ui:
        title: Analog TV
        subtitle: Webcam through a realtime Metal shader
        rotation_choices: [90_cw, "0", "180", 90_ccw]
        controls:
          - { label: Effect, key: intensity, range: [0.0, 1.5] }
          - { label: Render Scale, key: render_scale, range: [0.5, 1.0] }
          - { label: Auto Optimize, key: auto_optimize, range: [0.0, 1.0] }
          - { label: Effect Quality, key: effect_quality, range: [0.0, 1.0] }
          - { label: RF Noise, key: noise, range: [0.0, 1.0] }
          - { label: Tracking, key: tracking, range: [0.0, 1.0] }
          - { label: Scanlines, key: scanlines, range: [0.0, 1.0] }
          - { label: Color Bleed, key: color_bleed, range: [0.0, 1.0] }
          - { label: Ghosting, key: ghosting, range: [0.0, 1.0] }
          - { label: Curvature, key: curvature, range: [0.0, 1.0] }
          - { label: Shadow Mask, key: shadow_mask, range: [0.0, 1.0] }
          - { label: Saturation, key: saturation, range: [0.0, 1.4] }
          - { label: Vertical Hold, key: vertical_hold, range: [0.0, 1.0] }
          - { label: Tape Crease, key: tape_crease, range: [0.0, 1.0] }
          - { label: Interlace, key: interlace, range: [0.0, 1.0] }
          - { label: Hum Bars, key: hum_bars, range: [0.0, 1.0] }
          - { label: Ringing, key: edge_ringing, range: [0.0, 1.0] }
          - { label: Bloom, key: bloom, range: [0.0, 1.0] }
          - { label: Dropouts, key: dropouts, range: [0.0, 1.0] }
          - { label: RF Interference, key: rf_interference, range: [0.0, 1.0] }
          - { label: Impulse Noise, key: impulse_noise, range: [0.0, 1.0] }
          - { label: AGC Pumping, key: agc_pumping, range: [0.0, 1.0] }
          - { label: Chroma Phase, key: chroma_phase_drift, range: [0.0, 1.0] }
          - { label: Cross Color, key: cross_color, range: [0.0, 1.0] }
          - { label: Chroma Noise, key: chroma_noise, range: [0.0, 1.0] }
          - { label: Tape Scratches, key: tape_scratches, range: [0.0, 1.0] }
          - { label: Head Switching, key: head_switching, range: [0.0, 1.0] }
          - { label: Timebase Error, key: timebase_error, range: [0.0, 1.0] }
          - { label: Misconvergence, key: rgb_misconvergence, range: [0.0, 1.0] }
          - { label: Phosphor Flicker, key: phosphor_flicker, range: [0.0, 1.0] }
          - { label: Signal Clamp, key: signal_clamp, range: [0.0, 1.0] }
          - { label: Persistence, key: phosphor_persistence, range: [0.0, 1.0] }
          - { label: Frame Smear, key: frame_smear, range: [0.0, 1.0] }
          - { label: Burn-In, key: burn_in, range: [0.0, 1.0] }
          - { label: Mic React, key: mic_reactivity, range: [0.0, 1.0] }
