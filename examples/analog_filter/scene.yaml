  adaptive_render_scale:
    type: render.adaptive_resolution
    input: analog_settings.params
    params:
      min_scale: 0.5
      max_scale: 1.0
      quantize_step: 0.05
      lower_fps_threshold: 52.0
      upper_fps_threshold: 58.0
      decrease_step: 0.03
      increase_step: 0.012
      reset_when_auto_optimize_disabled: true
      flush_texture_cache_every_frames: 180
  analog_tv:
    type: render.post_process
    inputs:
      source: camera.video
      previous: feedback_history.texture
      audio: audio_meter.levels
      settings: analog_settings.params
      render_scale: adaptive_render_scale.scale
    shader: shaders/analog/analog_tv.metal
    pass: analogTVFragment
    params:
      vertex_function: fullscreenVertex
      present_function: presentFragment
      offscreen_pixel_format: rgba16f
      output_pixel_format: bgra8
      sampler: linear_clamp
      input_layout: camera_aspect_fill
      output_size: [1920, 1080]
      fallback_when_feedback_allocation_fails: clear_drawable
      uniforms:
        - time
        - intensity
        - noise
        - tracking
        - scanlines
        - colorBleed
        - ghosting
        - curvature
        - shadowMask
        - saturation
        - inputWidth
        - inputHeight
        - outputWidth
        - outputHeight
        - verticalHold
        - tapeCrease
        - interlace
        - humBars
        - edgeRinging
        - bloom
        - dropouts
        - sourceRotation
        - audioLevel
        - audioPeak
        - audioTransient
        - audioBass
        - micReactivity
        - rfInterference
        - impulseNoise
        - agcPumping
        - chromaPhaseDrift
        - crossColor
        - chromaNoise
        - tapeScratches
        - headSwitching
        - timebaseError
        - rgbMisconvergence
        - phosphorFlicker
        - signalClamp
        - phosphorPersistence
        - frameSmear
        - burnIn
        - feedbackReady
        - effectQuality
      artifact_groups:
        rf_broadcast_reception:
          - weak_signal_snow
          - impulse_noise_bursts
          - multipath_echo_shimmer
          - agc_exposure_pumping
          - rolling_interference_bands
        composite_ntsc_decoder:
          - chroma_phase_drift
          - cross_color_rainbow
          - cross_luma_dot_texture
          - chroma_crawl
          - chroma_noise
          - luma_chroma_delay
        vhs_tape_transport:
          - time_base_error_wobble
          - head_switching_noise
          - tape_crease_bands
          - oxide_scratches
          - dropout_bursts
          - chroma_loss_on_damage
        crt_display:
          - scanlines
          - interlace_shimmer
          - shadow_mask
          - rgb_misconvergence
          - beam_softness
          - bloom
          - phosphor_flicker
          - phosphor_persistence
          - corner_vignette
          - tube_edge_falloff
        system_drift:
          - horizontal_sync_wobble
          - vertical_hold_roll
          - black_level_lift
          - white_clipping
          - color_temperature_drift
          - per_frame_instability
        microphone_reactivity:
          - level_reactive_snow
          - level_reactive_bloom
          - transient_sync_hits
          - bass_horizontal_wobble
          - audio_reactive_dropouts
        temporal_feedback:
          - previous_frame_ping_pong
          - phosphor_persistence
          - frame_smear
          - retained_highlight_burn_in
        optimization:
          - render_scale
          - auto_optimize
          - effect_quality
          - expensive_sample_skip
          - texture_cache_flush
  present:
    type: render.present
    input: analog_tv.texture
    params:
      pass: presentFragment
      scale_mode: fill
      color_space: rec709
outputs:
  preview:
    type: screen
    input: present.drawable
  capture:
    type: media.capture_sink
    input: analog_tv.texture
    params:
      container: frames
      codec: png16
      path: captures/analog_filter/frame_%05d.png
  events:
    type: event.ndjson
    input: analog_tv.events
