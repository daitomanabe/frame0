name: spatial_audio_visualizer
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: true
  network: false
  file_read: false
  file_write: true
clock:
  primary: audio
  fallback: monotonic
  fixed_step_ns: 16666667
inputs:
  spatial_audio:
    type: audio.input
    selector:
      capability: audio.input
      vendor: mock
    mode: ambisonic_b_format_48k
    params:
      channels: 4
      format: f32
nodes:
  analyzer:
    type: audio.spatial_analyzer
    input: spatial_audio.samples
    params:
      fft_size: 2048
      hop_size: 512
      bands: 32
      output: direction_energy
  source_tracker:
    type: audio.source_tracker
    input: analyzer.direction_energy
    params:
      max_sources: 8
      smoothing_ms: 140
  geometry:
    type: render.instanced_geometry
    input: source_tracker.sources
    params:
      primitive: sphere
      count: 512
      radius_mapping: energy
      position_mapping: azimuth_elevation
  bloom:
    type: render.post_process
    input: geometry.texture
    shader: shaders/audio/spatial_bloom.msl
    params:
      threshold: 0.42
      intensity: 0.75
  recorder:
    type: audio.recorder
    input: spatial_audio.samples
    params:
      path: captures/spatial_audio_visualizer/audio.wav
      format: wav_f32
outputs:
  preview:
    type: screen
    input: bloom.texture
  audio_capture:
    type: media.capture_sink
    input: recorder.file
    params:
      container: wav
      path: captures/spatial_audio_visualizer/audio.wav
