name: mock_sdk_input
version: "0.1"
runtime: frame0
permissions:
  camera: true
  microphone: true
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
inputs:
  mock_video:
    type: device.video_input
    selector:
      capability: video.input
      vendor: frame0.mock
    mode: 1080p60
  mock_audio:
    type: device.audio_input
    selector:
      capability: audio.input
      vendor: frame0.mock
nodes:
  video_texture:
    type: media.texture_from_video
    input: mock_video.video
  audio_level:
    type: audio.level
    input: mock_audio.audio
  shader:
    type: render.shader
    shader: shaders/mock_sdk_input.msl
    inputs:
      image: video_texture.texture
      level: audio_level.value
outputs:
  preview:
    type: screen
    input: shader.output

