name: ml_multimodal_pipeline
version: "0.1"
runtime: frame0
permissions:
  camera: true
  microphone: true
  network: false
  file_read: true
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
inputs:
  camera:
    type: device.video_input
    selector:
      capability: video.input
      vendor: frame0.mock
    mode: 1080p60
  audio:
    type: audio.input
    selector:
      capability: audio.input
      vendor: frame0.mock
    mode: stereo_48k
nodes:
  model_registry:
    type: ml.model_registry
    models:
      - id: mock_classifier
        backend: native_mock
        model_path: models/mock_classifier.frame0model
        precision: fp32
        inputs:
          - name: image
            dtype: f32
            shape: [1, 3, 224, 224]
            semantic: image
        outputs:
          - name: class_probabilities
            dtype: f32
            shape: [1, 10]
            semantic: classification
        capabilities: [ml.inference, ml.classification]
      - id: mock_audio_embedding
        backend: native_mock
        model_path: models/mock_audio_embedding.frame0model
        precision: fp32
        inputs:
          - name: mel
            dtype: f32
            shape: [1, 64, 96]
            semantic: audio
        outputs:
          - name: embedding
            dtype: f32
            shape: [1, 128]
            semantic: embedding
        capabilities: [ml.inference, ml.embedding]
  image_preprocess:
    type: ml.preprocess.video
    inputs:
      image: camera.video
      registry: model_registry.models
    model: mock_classifier
    params:
      resize: [224, 224]
      layout: nchw
      normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
      color_space: rgb
  audio_preprocess:
    type: ml.preprocess.audio
    inputs:
      samples: audio.samples
      registry: model_registry.models
    model: mock_audio_embedding
    params:
      sample_rate: 48000
      window_ms: 25
      hop_ms: 10
      mel_bins: 64
      frames: 96
  classifier:
    type: ml.native_inference
    inputs:
      tensor: image_preprocess.tensor
      registry: model_registry.models
    model: mock_classifier
    backend: native_mock
    selector:
      capability: ml.inference
  audio_embedding:
    type: ml.native_inference
    inputs:
      tensor: audio_preprocess.tensor
      registry: model_registry.models
    model: mock_audio_embedding
    backend: native_mock
    selector:
      capability: ml.inference
  postprocess:
    type: ml.postprocess.multimodal
    inputs:
      classes: classifier.output
      embedding: audio_embedding.output
    params:
      top_k: 5
      smooth_frames: 8
      emit_embeddings: true
      deterministic_outputs:
        classifier:
          top_label: mock_person
          confidence: 0.92
        audio_embedding:
          centroid: [0.12, 0.48, 0.31]
  overlay:
    type: render.shader
    inputs:
      image: camera.video
      inference: postprocess.output
    shader: shaders/ml_multimodal_overlay.msl
    params:
      show_labels: true
      show_embedding_plot: true
      confidence_threshold: 0.5
outputs:
  preview:
    type: screen
    input: overlay.output
  inference_events:
    type: event.ndjson
    input: postprocess.events
