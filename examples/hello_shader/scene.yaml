name: hello_shader
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: false
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
nodes:
  color_shader:
    type: render.shader
    shader: shaders/hello.msl
    params:
      color:
        type: color
        value: [0.1, 0.7, 1.0, 1.0]
outputs:
  preview:
    type: screen
    input: color_shader.output

