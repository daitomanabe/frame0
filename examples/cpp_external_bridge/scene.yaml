name: cpp_external_bridge
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: false
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
nodes:
  cpp_external:
    type: external.cpp.gain_bias
    external: org.example.frame0.cpp_external
    params:
      gain: 1.25
      bias: 0.05
      control:
        request_schema: external_control.v0
        response_schema: external_control_result.v0
  visualizer:
    type: render.shader
    input: cpp_external.output
    shader: shaders/cpp_external_visualizer.msl
    params:
      color: [0.1, 0.6, 1.0, 1.0]
outputs:
  preview:
    type: screen
    input: visualizer.output
