name: c_external_gain_addon_example
version: "0.1"
runtime: frame0
permissions:
  camera: false
  microphone: false
  network: false
clock:
  primary: manual
  fallback: monotonic
  fixed_step_ns: 16666667
nodes:
  gain:
    type: addon.external.gain
    addon: org.example.frame0.c_external_gain
    params:
      gain: 1.4
      bias: 0.05
  shader:
    type: render.shader
    input: gain.output
    shader: shaders/gain_visualizer.msl
outputs:
  preview:
    type: screen
    input: shader.output
